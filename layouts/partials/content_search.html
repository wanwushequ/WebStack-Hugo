<style>
#site-search-results {
    background: #fff;
    border-radius: 0 0 8px 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    max-height: 420px;
    overflow-y: auto;
    margin-top: 2px;
    position: relative;
    z-index: 999;
}
.site-results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px 6px;
    font-size: 12px;
    color: #aaa;
    border-bottom: 1px solid #f0f0f0;
}
#site-results-close { color: #bbb; font-size: 12px; text-decoration: none; }
#site-results-close:hover { color: #666; }
#site-results-list { padding: 4px 0; }
.site-result-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    text-decoration: none;
    color: inherit;
    gap: 12px;
    transition: background 0.15s;
    border-bottom: 1px solid #f8f8f8;
}
.site-result-item:hover { background: #f5f8ff; text-decoration: none; color: inherit; }
.site-result-logo {
    width: 26px; height: 26px; border-radius: 4px;
    object-fit: contain; flex-shrink: 0; background: #f5f5f5;
}
.site-result-logo-placeholder {
    width: 26px; height: 26px; border-radius: 4px;
    background: #e8edf5; display: flex; align-items: center;
    justify-content: center; font-size: 12px; color: #6b8cba; flex-shrink: 0;
}
.site-result-info { flex: 1; min-width: 0; }
.site-result-title {
    font-size: 14px; font-weight: 500; color: #222;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.site-result-title mark { background: #fff3a3; color: inherit; padding: 0 1px; border-radius: 2px; }
.site-result-desc {
    font-size: 12px; color: #999;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.site-result-category { font-size: 11px; color: #bbb; flex-shrink: 0; }
.site-no-results { text-align: center; padding: 20px; color: #bbb; font-size: 13px; }
</style>

<script>
(function () {
    var siteData = [
        {{ range $ti, $tax := .Site.Data.webstack }}
            {{ $category := $tax.taxonomy }}
            {{ range $tax.links }}
                { title:{{ .title | jsonify }}, url:{{ .url | jsonify }}, desc:{{ .description | jsonify }}, logo:{{ .logo | jsonify }}, category:{{ $category | jsonify }} },
            {{ end }}
        {{ end }}
    ];

    var isSiteSearch = true;

    function hl(text, q) {
        if (!text || !q) return text || '';
        return text.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>');
    }

    function doSiteSearch(q) {
        if (!q) { closeResults(); return; }
        var kw = q.toLowerCase();
        var results = siteData.filter(function(d) {
            return (d.title||'').toLowerCase().indexOf(kw)>-1 ||
                   (d.desc ||'').toLowerCase().indexOf(kw)>-1 ||
                   (d.category||'').toLowerCase().indexOf(kw)>-1;
        });
        document.getElementById('site-results-count').textContent = results.length ? '找到 '+results.length+' 个结果' : '';
        var list = document.getElementById('site-results-list');
        if (!results.length) {
            list.innerHTML = '<div class="site-no-results">没有找到相关网站</div>';
        } else {
            list.innerHTML = results.slice(0,30).map(function(d) {
                var logo = d.logo
                    ? '<img class="site-result-logo" src="/assets/images/logos/'+d.logo+'" onerror="this.style.display=\'none\'">'
                    : '<div class="site-result-logo-placeholder">'+(d.title||'?').charAt(0)+'</div>';
                return '<a class="site-result-item" href="'+d.url+'" target="_blank" rel="noopener">'
                    +logo+'<div class="site-result-info">'
                    +'<div class="site-result-title">'+hl(d.title,q)+'</div>'
                    +'<div class="site-result-desc">'+(d.desc||'')+'</div>'
                    +'</div><span class="site-result-category">'+(d.category||'')+'</span></a>';
            }).join('');
        }
        document.getElementById('site-search-results').style.display = 'block';
    }

    function closeResults() {
        document.getElementById('site-search-results').style.display = 'none';
    }

    $(document).ready(function() {
        // 默认触发"站内"tab
        $('label[data-id="group-site"]').trigger('click');

        $('input[name="type"]').on('change', function() {
            isSiteSearch = (this.value === 'site-search');
            $('#search-text').attr('placeholder', isSiteSearch ? '搜索导航内的网站名称或描述' : ($(this).data('placeholder')||'输入关键字搜索'));
            if (!isSiteSearch) closeResults();
        });

        $('#search-text').on('input', function() {
            if (!isSiteSearch) return;
            var q = $(this).val().trim();
            if (q.length >= 1) doSiteSearch(q); else closeResults();
        });

        $('.super-search-fm').on('submit', function(e) {
            if (isSiteSearch) { e.preventDefault(); doSiteSearch($('#search-text').val().trim()); }
        });

        $('#site-results-close').on('click', closeResults);

        $(document).on('click', function(e) {
            if (!$(e.target).closest('#search, #site-search-results').length) closeResults();
        });

        $(document).on('keydown', function(e) { if (e.key==='Escape') closeResults(); });
    });
})();
</script>
